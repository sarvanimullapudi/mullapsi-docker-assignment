apiVersion: apps/v1
kind: Deployment
metadata:
  name: mullapsi-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: word-counter
  template:
    metadata:
      labels:
        app: word-counter
    spec:
      containers:
      - name: word-counter
        image: mullapsi-container:latest
        imagePullPolicy: Never
